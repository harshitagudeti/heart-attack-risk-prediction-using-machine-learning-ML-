<!DOCTYPE html>
<html>
<head>
<title>Heart Attack Prediction</title>

<style>
body{
font-family:Arial;
background:#eef2f7;
}

.container{
width:400px;
margin:60px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h2{text-align:center;color:red;}

input{
width:100%;
padding:8px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:red;
color:white;
border:none;
cursor:pointer;
}

.result{
text-align:center;
font-size:20px;
margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h2>❤️ Heart Attack Prediction</h2>

<form action="/predict" method="post">

<input type="number" name="age" placeholder="Age" required>
<input type="number" name="cholesterol" placeholder="Cholesterol" required>
<input type="number" name="heartrate" placeholder="Heart Rate" required>
<input type="number" step="0.1" name="bmi" placeholder="BMI" required>
<input type="number" name="stress" placeholder="Stress Level" required>

<button type="submit">Predict Risk</button>

</form>

<div class="result">
{{ prediction_text }}
</div>

</div>

</body>
</html>
